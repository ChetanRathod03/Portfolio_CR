server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: portfolio-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:portfolio_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Chetan@1539}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' auto-creates/updates tables from entities - fine for a solo portfolio project.
      # Switch to 'validate' + a migration tool (Flyway/Liquibase) if this ever needs to be team-safe.
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  # where recruiter/contact notification emails get sent
  notify-email: ${NOTIFY_EMAIL:crathod342003@gmail.com}
  # comma-separated list of origins allowed to call this API (your deployed frontend domain(s))
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.chetanrathod.portfolio: INFO
    org.springframework.web: INFO
