version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-portfolio_db}
      POSTGRES_USER: ${DB_USERNAME:-portfolio_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portfolio_pass}
    volumes:
      - portfolio_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-portfolio_user} -d ${DB_NAME:-portfolio_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-portfolio_db}
      DB_USERNAME: ${DB_USERNAME:-portfolio_user}
      DB_PASSWORD: ${DB_PASSWORD:-portfolio_pass}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-crathod342003mail.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend-dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"

volumes:
  portfolio_db_data:
